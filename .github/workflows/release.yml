name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish GUI
        run: dotnet publish src/LLMUninstaller.Gui/LLMUninstaller.Gui.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish/gui

      - name: Publish CLI
        run: dotnet publish src/LLMUninstaller.Cli/LLMUninstaller.Cli.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish/cli

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path publish/gui/LLMUninstaller.exe, publish/cli/llmuninstaller-cli.exe -DestinationPath LLMUninstaller-portable-win-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/gui/LLMUninstaller.exe
            publish/cli/llmuninstaller-cli.exe
            LLMUninstaller-portable-win-x64.zip
